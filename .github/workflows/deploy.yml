name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 - <<'PYEOF'
          import ftplib, os, pathlib, sys

          HOST     = '147.93.38.41'
          USER     = 'u164538823.estrategia.cafe'
          PASSWORD = os.environ['FTP_PASSWORD']
          LOCAL    = pathlib.Path('dist')
          REMOTE   = '/public_html'

          def upload(ftp, local_dir, remote_dir):
              for item in sorted(local_dir.iterdir()):
                  remote_path = f"{remote_dir}/{item.name}"
                  if item.is_dir():
                      try:
                          ftp.mkd(remote_path)
                      except ftplib.error_perm:
                          pass
                      upload(ftp, item, remote_path)
                  else:
                      with open(item, 'rb') as f:
                          ftp.storbinary(f'STOR {remote_path}', f)
                      print(f'  ✓ {remote_path}')

          print(f'Connecting to {HOST}...')
          ftp = ftplib.FTP()
          ftp.connect(HOST, 21, timeout=30)
          ftp.login(USER, PASSWORD)
          ftp.set_pasv(True)
          print('Logged in. Uploading dist/ → /public_html ...')
          upload(ftp, LOCAL, REMOTE)
          ftp.quit()
          print('Deploy complete!')
          PYEOF
