name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Push build to deploy branch
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          cd out
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Fetch existing deploy history so the pull on Hostinger stays fast-forward
          git fetch "$REPO_URL" deploy && git reset FETCH_HEAD || true
          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ github.sha }}"
          git push "$REPO_URL" HEAD:deploy
